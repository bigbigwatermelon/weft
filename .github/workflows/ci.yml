name: CI

on:
  workflow_dispatch:
    inputs:
      base_ref:
        description: 'Base branch or ref for whitespace diff checks'
        required: false
        default: 'main'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check whitespace errors
        run: |
          git fetch origin ${{ inputs.base_ref }} --depth=1
          git diff --check FETCH_HEAD...HEAD

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.33.2

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check and build frontend
        run: pnpm build

  rust-test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'ubuntu-latest'
            args: ''
          - platform: 'macos-latest'
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux Rust dependencies
        if: ${{ matrix.platform == 'ubuntu-latest' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf protobuf-compiler

      - name: Install macOS protobuf compiler
        if: ${{ matrix.platform == 'macos-latest' }}
        run: brew install protobuf

      - name: Install Windows protobuf compiler
        if: ${{ matrix.platform == 'windows-latest' }}
        shell: pwsh
        run: choco install protoc --yes

      - name: Verify protobuf compiler
        run: protoc --version

      - name: Run Rust tests
        if: ${{ matrix.platform != 'windows-latest' }}
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Build Windows Rust test binaries
        if: ${{ matrix.platform == 'windows-latest' }}
        run: cargo test --manifest-path src-tauri/Cargo.toml --no-run
