  <circle cx="1170" cy="246" r="13" fill="#2a2734"/>
  <g class="gl" stroke="#b8b5c2"><circle cx="1165" cy="240" r="2.4" fill="#b8b5c2" stroke="none"/><path d="M1165,242 v6 a8,8 0 0 0 8,8"/><circle cx="1165" cy="253" r="2.4" fill="#b8b5c2" stroke="none"/><circle cx="1176" cy="256" r="2.4" fill="#b8b5c2" stroke="none"/></g>
  <text class="ttl" x="1192" y="244" font-size="14">合并</text>
  <text class="sub" x="1156" y="288">并入主干</text>

