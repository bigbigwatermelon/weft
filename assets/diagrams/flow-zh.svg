  <rect x="1516" y="216" width="120" height="88" rx="13" fill="#2a1c18" stroke="#f2683c" stroke-width="1.5"/>
  <circle cx="1546" cy="250" r="14" fill="#f2683c" opacity="0.9"/>
  <path class="gl" d="M1540,250 l4,4 l8,-9" stroke="#1a120f" stroke-width="2.1"/>
  <text x="1568" y="255" fill="#f7b094" font-size="14.5" font-weight="600">已上线</text>

  <!-- now / roadmap brackets -->
  <path class="gl" d="M948,322 v7 M948,329 H1098 M1098,329 v-7" stroke="#3a5a48" stroke-width="1.2" opacity=".8"/>
  <text class="lbl" x="1023" y="348" fill="#5fbf92" text-anchor="middle">当前</text>
  <path class="gl" d="M1140,322 v7 M1140,329 H1636 M1636,329 v-7" stroke="#7a5a24" stroke-width="1.2" stroke-dasharray="4 4" opacity=".9"/>
  <text class="lbl" x="1388" y="348" fill="#caa14e" text-anchor="middle">路线图 —— 自动合并 &amp; CI/CD,真正的交付目标</text>
