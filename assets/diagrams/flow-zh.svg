  <rect class="node" x="740" y="212" width="158" height="96" rx="13" stroke="#3a5a48"/>
  <circle cx="770" cy="246" r="14" fill="#35c98b" opacity="0.16"/>
  <path class="gl" d="M764,246 l4,4 l8,-9" stroke="#4fd49b"/>
