  <circle cx="1362" cy="246" r="13" fill="#2a2734"/>
  <g class="gl" stroke="#b8b5c2"><path d="M1356,243 a7,7 0 1 1 -0.6,5"/><path d="M1356,238 v5 h5"/></g>
