  <rect x="0" y="0" width="1660" height="540" rx="18" fill="#15141a"/>
  <circle cx="319" cy="260" r="62" fill="#4f46e5" opacity="0.15" filter="url(#glow)"/>
  <circle cx="1576" cy="260" r="66" fill="#f2683c" opacity="0.17" filter="url(#glow)"/>

  <path class="gl" d="M190,260 H224" stroke="#5b5866" marker-end="url(#arr)"/>
