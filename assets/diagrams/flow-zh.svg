  <circle cx="978" cy="246" r="13" fill="#2a2734"/>
  <g class="gl" stroke="#b8b5c2"><circle cx="973" cy="241" r="2.4" fill="#b8b5c2" stroke="none"/><circle cx="973" cy="252" r="2.4" fill="#b8b5c2" stroke="none"/><path d="M973,243 v7"/><path d="M973,244 C980,244 984,247 984,252"/><circle cx="984" cy="252" r="2.4" fill="#b8b5c2" stroke="none"/></g>
  <text class="ttl" x="1000" y="244" font-size="14">开 PR</text>
  <text class="sub" x="964" y="288">起草改动</text>

