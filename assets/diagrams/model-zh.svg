<svg viewBox="0 0 1320 560" xmlns="http://www.w3.org/2000/svg" font-family="'Inter','PingFang SC','Microsoft YaHei','Noto Sans CJK SC','Hiragino Sans GB',sans-serif">
  <defs>
    <marker id="m2arr" markerWidth="10" markerHeight="10" refX="7" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 z" fill="#5b5866"/></marker>
    <filter id="g2" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="20"/></filter>
    <style>
      .ttl{fill:#f3f2f7;font-size:17px;font-weight:600}
      .sub{fill:#8b8896;font-size:11.5px}
      .lbl{fill:#75727f;font-size:10.5px;font-weight:500;letter-spacing:.4px}
      .node{fill:#1f1d27;stroke:#36333f;stroke-width:1}
      .gl{stroke-width:1.7;fill:none;stroke-linecap:round;stroke-linejoin:round}
      .rt{fill:#f3f2f7;font-size:13.5px;font-weight:600}
      .rs{fill:#8b8896;font-size:10.5px}
    </style>
  </defs>

  <rect x="0" y="0" width="1320" height="560" rx="18" fill="#15141a"/>
  <circle cx="460" cy="222" r="64" fill="#4f46e5" opacity="0.14" filter="url(#g2)"/>

  <path class="gl" d="M280,222 H340" stroke="#5b5866" marker-end="url(#m2arr)"/>
  <text class="lbl" x="294" y="210" fill="#75727f">包含</text>
  <path class="gl" d="M580,222 H640" stroke="#5b5866" marker-end="url(#m2arr)"/>
  <text class="lbl" x="594" y="210" fill="#75727f">包含</text>
  <path class="gl" d="M880,222 H940" stroke="#5b5866" marker-end="url(#m2arr)"/>
  <text class="lbl" x="956" y="210" fill="#75727f">包含</text>

  <path class="gl" d="M160,274 V372" stroke="#5b5866" stroke-dasharray="2 6" opacity="0.7"/>
  <text class="lbl" x="168" y="330">角色</text>
  <path class="gl" d="M460,274 V372" stroke="#7c74f0" stroke-dasharray="2 6" opacity="0.8"/>
  <text class="lbl" x="468" y="330" fill="#8b84e8">角色</text>
  <path class="gl" d="M1060,274 V372" stroke="#35c98b" stroke-dasharray="2 6" opacity="0.7"/>
  <text class="lbl" x="1068" y="330" fill="#5fbf92">角色</text>

  <!-- Workspace -->
  <rect class="node" x="40" y="170" width="240" height="104" rx="14"/>
  <circle cx="74" cy="206" r="14" fill="#2a2734"/>
  <g class="gl" stroke="#b8b5c2"><rect x="68" y="200" width="5" height="12" rx="1"/><rect x="75" y="197" width="5" height="15" rx="1"/><rect x="82" y="203" width="5" height="9" rx="1" opacity=".7"/></g>
  <text class="ttl" x="98" y="204">Workspace</text>
  <text class="sub" x="56" y="240">一组仓库引用的清单</text>

  <!-- Issue -->
  <rect x="340" y="170" width="240" height="104" rx="14" fill="#211f33" stroke="#4f46e5" stroke-width="1.3"/>
  <circle cx="374" cy="206" r="14" fill="#4f46e5" opacity="0.18"/>
  <g class="gl" stroke="#9a93f7"><path d="M368,200 C374,203 376,209 382,211"/><path d="M368,206 C374,206 376,206 380,206"/><path d="M368,212 C374,209 376,203 381,206"/></g>
  <text class="ttl" x="398" y="204">Issue</text>
  <text class="sub" x="356" y="240">一个任务 / 需求</text>

  <!-- Direction -->
  <rect class="node" x="640" y="170" width="240" height="104" rx="14"/>
  <circle cx="674" cy="206" r="14" fill="#2a2734"/>
  <g class="gl" stroke="#b8b5c2"><path d="M667,206 h12"/><path d="M675,201 l5,5 l-5,5"/></g>
  <text class="ttl" x="698" y="204">Direction</text>
  <text class="sub" x="656" y="234">一片工作</text>
  <text class="sub" x="656" y="252">write/read 仓 · 一个工具</text>

  <!-- Session -->
  <rect class="node" x="940" y="170" width="240" height="104" rx="14"/>
  <circle cx="974" cy="206" r="14" fill="#2a2734"/>
  <g class="gl" stroke="#b8b5c2"><rect x="966" y="199" width="16" height="13" rx="2"/><path d="M966,203 h16" opacity=".6"/><circle cx="969.5" cy="201" r="0.9" fill="#b8b5c2" stroke="none"/></g>
  <text class="ttl" x="998" y="204">Session</text>
  <text class="sub" x="956" y="234">工具 × worktree</text>
  <text class="sub" x="956" y="252">角色 · 原生会话 id</text>

  <!-- Role: curator -->
  <rect x="25" y="372" width="270" height="74" rx="12" fill="#1c1b22" stroke="#36333f"/>
  <circle cx="56" cy="409" r="13" fill="#2a2734"/>
  <g class="gl" stroke="#b8b5c2"><circle cx="56" cy="405" r="3"/><path d="M49,416 C49,411 63,411 63,416"/></g>
  <text class="rt" x="78" y="402">curator</text>
  <text class="rs" x="78" y="421">维护仓库地图</text>

  <!-- Role: lead -->
  <rect x="325" y="372" width="270" height="74" rx="12" fill="#1f1d2e" stroke="#4f46e5" stroke-opacity="0.6"/>
  <circle cx="356" cy="409" r="13" fill="#4f46e5" opacity="0.2"/>
  <circle cx="356" cy="409" r="7.5" fill="none" stroke="#9a93f7" class="gl"/>
  <path d="M356,402.5 L360,409 L356,415.5 L352,409 Z" fill="#9a93f7"/>
  <text class="rt" x="378" y="402" fill="#cfcbf6">lead</text>
  <text class="rs" x="378" y="421">只读 · 规划 · 驱动 worker</text>

  <!-- Role: worker -->
  <rect x="925" y="372" width="270" height="74" rx="12" fill="#1c1b22" stroke="#36333f"/>
  <circle cx="956" cy="409" r="13" fill="#2a2734"/>
  <g class="gl" stroke="#5fbf92"><path d="M951,404 l4,5 l-4,5"/><path d="M958,415 h6"/></g>
  <text class="rt" x="978" y="402">worker</text>
  <text class="rs" x="978" y="421">执行单个方向</text>
</svg>
