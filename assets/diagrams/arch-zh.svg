<svg viewBox="0 0 1320 650" xmlns="http://www.w3.org/2000/svg" font-family="'Inter','PingFang SC','Microsoft YaHei','Noto Sans CJK SC','Hiragino Sans GB',sans-serif">
  <defs>
    <marker id="a3" markerWidth="9" markerHeight="9" refX="6.5" refY="3.2" orient="auto"><path d="M0,0 L6.5,3.2 L0,6.4 z" fill="#5b5866"/></marker>
    <marker id="a3u" markerWidth="9" markerHeight="9" refX="6.5" refY="3.2" orient="auto"><path d="M0,0 L6.5,3.2 L0,6.4 z" fill="#5b5866"/></marker>
    <style>
      .ct{fill:#cfcdd6;font-size:14px;font-weight:600;letter-spacing:.2px}
      .cs{fill:#75727f;font-size:11px}
      .chip{fill:#211f29;stroke:#383640;stroke-width:1}
      .clbl{fill:#eceaf2;font-size:13.5px;font-weight:600}
      .csub{fill:#827f8c;font-size:10.5px}
      .gl{stroke-width:1.6;fill:none;stroke-linecap:round;stroke-linejoin:round}
      .pill{fill:#211f33;stroke:#4f46e5;stroke-width:1.2}
    </style>
  </defs>

  <rect x="0" y="0" width="1320" height="650" rx="18" fill="#15141a"/>

  <!-- Frontend container -->
  <rect x="40" y="40" width="1240" height="168" rx="16" fill="#191820" stroke="#34323d"/>
  <g transform="translate(64,66)">
    <rect x="0" y="-2" width="16" height="13" rx="2.5" fill="none" stroke="#9a93f7" class="gl"/><path d="M0,2 h16" stroke="#9a93f7" class="gl" opacity=".6"/>
  </g>
  <text class="ct" x="90" y="76">前端</text>
  <text class="cs" x="138" y="76">React 19 · TypeScript · Tailwind</text>

  <!-- FE chips -->
  <g>
    <rect class="chip" x="64" y="98" width="284" height="86" rx="11"/>
    <g transform="translate(88,132)"><path class="gl" stroke="#b8b5c2" d="M-7,-6 h14 a2,2 0 0 1 2,2 v6 a2,2 0 0 1 -2,2 h-9 l-4,4 v-4 h-1 a2,2 0 0 1 -2,-2 v-6 a2,2 0 0 1 2,-2 z"/></g>
    <text class="clbl" x="110" y="130">Lead 对话</text>
    <text class="csub" x="80" y="160">主界面(家)</text>
  </g>
  <g>
    <rect class="chip" x="366" y="98" width="284" height="86" rx="11"/>
    <g transform="translate(390,132)" class="gl" stroke="#b8b5c2"><rect x="-7" y="-7" width="6" height="6" rx="1"/><rect x="1" y="-7" width="6" height="6" rx="1"/><rect x="-7" y="1" width="6" height="6" rx="1"/><rect x="1" y="1" width="6" height="6" rx="1"/></g>
    <text class="clbl" x="412" y="130">两级看板</text>
    <text class="csub" x="382" y="160">workspace · thread</text>
  </g>
  <g>
    <rect class="chip" x="668" y="98" width="284" height="86" rx="11"/>
    <g transform="translate(692,132)" class="gl" stroke="#b8b5c2"><rect x="-8" y="-7" width="16" height="14" rx="2"/><path d="M-4,-2 l3,3 l-3,3"/><path d="M1,4 h4"/></g>
    <text class="clbl" x="714" y="130">会话 chat 面板</text>
    <text class="csub" x="684" y="160">weft 自有时间线 · composer</text>
  </g>
  <g>
    <rect class="chip" x="970" y="98" width="284" height="86" rx="11"/>
    <g transform="translate(994,132)" class="gl" stroke="#b8b5c2"><circle cx="-6" cy="-4" r="2.2" fill="#b8b5c2" stroke="none"/><circle cx="6" cy="-5" r="2.2" fill="#b8b5c2" stroke="none"/><circle cx="3" cy="6" r="2.2" fill="#b8b5c2" stroke="none"/><path d="M-6,-4 L6,-5 M6,-5 L3,6 M-6,-4 L3,6"/></g>
    <text class="clbl" x="1016" y="130">Scope · 图 · diff</text>
    <text class="csub" x="986" y="160">把决策呈现清楚</text>
  </g>

