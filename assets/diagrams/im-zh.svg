<svg viewBox="0 0 1320 600" xmlns="http://www.w3.org/2000/svg" font-family="'Inter','PingFang SC','Microsoft YaHei','Noto Sans CJK SC','Hiragino Sans GB',sans-serif">
  <defs>
    <marker id="im_a" markerWidth="9" markerHeight="9" refX="6.5" refY="3.2" orient="auto"><path d="M0,0 L6.5,3.2 L0,6.4 z" fill="#6b655c"/></marker>
    <marker id="im_aB" markerWidth="9" markerHeight="9" refX="6.5" refY="3.2" orient="auto"><path d="M0,0 L6.5,3.2 L0,6.4 z" fill="#49c0c9"/></marker>
    <marker id="im_aO" markerWidth="9" markerHeight="9" refX="6.5" refY="3.2" orient="auto"><path d="M0,0 L6.5,3.2 L0,6.4 z" fill="#e7bd61"/></marker>
    <filter id="imglow" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="20"/></filter>
    <style>
      .ttl{fill:#f1eee8;font-size:14.5px;font-weight:600}
      .sub{fill:#9b948a;font-size:11px}
      .lbl{fill:#8e887f;font-size:11px;font-weight:500;letter-spacing:.2px}
      .node{fill:#211f1a;stroke:#3a352e;stroke-width:1}
      .gl{stroke-width:1.6;fill:none;stroke-linecap:round;stroke-linejoin:round}
      .pill{fill:#173034;stroke:#49c0c9;stroke-width:1.2}
      .ct{fill:#d7d0c5;font-size:13px;font-weight:600;letter-spacing:.2px}
      .cs{fill:#8e887f;font-size:10.5px}
      .card{fill:#211f1a;stroke:#3a352e;stroke-width:1}
      .ch{fill:#eee8df;font-size:11.5px;font-weight:600}
      .cb{fill:#9b948a;font-size:10.5px}
    </style>
  </defs>

  <rect x="0" y="0" width="1320" height="600" rx="18" fill="#171512"/>
  <circle cx="660" cy="300" r="80" fill="#49c0c9" opacity="0.04"/>

  <!-- Title -->
  <text x="40" y="48" fill="#f1eee8" font-size="18" font-weight="600">IM 远程指挥</text>
  <text x="158" y="48" fill="#8e887f" font-size="12">飞书长连 · 同源应答 · 按 Issue 绑定话题</text>

  <!-- Left: Atlas (desktop) -->
  <rect x="40" y="80" width="290" height="440" rx="16" fill="#1b1915" stroke="#3a352e"/>
  <g transform="translate(64,108)">
    <rect x="0" y="-2" width="16" height="13" rx="2.5" fill="none" stroke="#9de5e8" class="gl"/><path d="M0,2 h16" stroke="#9de5e8" class="gl" opacity=".6"/>
  </g>
  <text class="ct" x="92" y="118">Atlas 桌面端</text>
  <text class="cs" x="92" y="134">本机 · Tauri</text>

  <g>
    <rect class="node" x="64" y="152" width="242" height="72" rx="11"/>
    <text class="ttl" x="84" y="180">Worker 触发权限</text>
    <text class="sub" x="84" y="200">claude / codex / opencode</text>
    <text class="sub" x="84" y="214">tool use → Ask Bridge</text>
  </g>
  <g>
    <rect class="node" x="64" y="236" width="242" height="72" rx="11"/>
    <text class="ttl" x="84" y="264">Agent 提问</text>
    <text class="sub" x="84" y="284">ask_human(从 worker)</text>
    <text class="sub" x="84" y="298">需要人答才能继续</text>
  </g>

  <rect x="64" y="324" width="242" height="76" rx="11" fill="#173034" stroke="#49c0c9" stroke-opacity="0.7"/>
  <text class="ttl" x="84" y="352" fill="#b8ecef">Ask Registry · Bus</text>
  <text class="sub" x="84" y="372">事件 Opened / Resolved</text>
  <text class="sub" x="84" y="386">桌面 + IM 同源应答</text>

  <g>
    <rect class="node" x="64" y="412" width="242" height="72" rx="11"/>
    <text class="ttl" x="84" y="440">Settings · 状态</text>
    <text class="sub" x="84" y="460">app_id / secret / status</text>
    <text class="sub" x="84" y="474">连接：disabled / online …</text>
  </g>

  <!-- Middle: IM bridge -->
  <rect x="370" y="80" width="280" height="440" rx="16" fill="#1b1915" stroke="#3a352e"/>
  <g transform="translate(394,108)" class="gl" stroke="#f27d53"><circle cx="0" cy="2" r="7"/><circle cx="0" cy="2" r="2.4" fill="#f27d53" stroke="none"/><path d="M0,-7 v3 M0,9 v3 M-7,2 h3 M9,2 h-3"/></g>
  <text class="ct" x="420" y="118">IM 桥</text>
  <text class="cs" x="420" y="134">src-tauri/src/im · 通道无关</text>

  <g>
    <rect class="node" x="394" y="152" width="232" height="72" rx="11"/>
    <text class="ttl" x="414" y="180">出站渲染</text>
    <text class="sub" x="414" y="200">perm_card / human_card</text>
    <text class="sub" x="414" y="214">截断 30KB · zh/en</text>
  </g>
  <g>
    <rect class="node" x="394" y="236" width="232" height="72" rx="11"/>
    <text class="ttl" x="414" y="264">入站路由</text>
    <text class="sub" x="414" y="284">回复匹配 message_id</text>
    <text class="sub" x="414" y="298">允许 / 拒绝 / 总是 / 放行</text>
  </g>
  <g>
    <rect class="node" x="394" y="320" width="232" height="64" rx="11"/>
    <text class="ttl" x="414" y="348">CardIndex（内存）</text>
    <text class="sub" x="414" y="368">ask_id ↔ message_id</text>
  </g>
  <g>
    <rect class="node" x="394" y="396" width="232" height="64" rx="11"/>
    <text class="ttl" x="414" y="424">绑定 · 白名单</text>
    <text class="sub" x="414" y="444">首位私聊自动绑定 owner</text>
  </g>

  <!-- channel pills -->
  <rect class="pill" x="394" y="476" width="232" height="32" rx="16"/>
  <text x="510" y="497" text-anchor="middle" fill="#b8ecef" font-size="11.5" font-weight="600">Channel trait · 飞书</text>

  <!-- Right: Feishu / user -->
  <rect x="690" y="80" width="590" height="440" rx="16" fill="#1b1915" stroke="#3a352e"/>
  <g transform="translate(714,108)" class="gl" stroke="#65d6a1"><circle cx="0" cy="2" r="7"/><circle cx="0" cy="2" r="2.4" fill="#65d6a1" stroke="none"/></g>
  <text class="ct" x="740" y="118">飞书</text>
  <text class="cs" x="740" y="134">长连 ws · open-lark · 卡片 1.0</text>

  <!-- Permission card (current) -->
  <g>
    <rect class="card" x="714" y="156" width="262" height="146" rx="10"/>
    <rect x="714" y="156" width="262" height="26" rx="10" fill="#332119"/>
    <rect x="714" y="172" width="262" height="10" fill="#332119"/>
    <text x="726" y="174" fill="#ffb092" font-size="11.5" font-weight="600">权限请求 · 登录超时修复</text>
    <text class="ch" x="726" y="204">Run: npm test</text>
    <text class="cb" x="726" y="222">backend · claude</text>
    <text class="cb" x="726" y="248" font-style="italic" fill="#8e887f">npm test</text>
    <text class="cb" x="726" y="280">回复本条消息作答：</text>
    <text class="cb" x="726" y="294" fill="#b8ecef">允许 / 拒绝 / 总是 / 放行（1/2/3/4）</text>
  </g>

  <!-- Human-ask card (current) -->
  <g>
    <rect class="card" x="1000" y="156" width="262" height="146" rx="10"/>
    <rect x="1000" y="156" width="262" height="26" rx="10" fill="#173034"/>
    <rect x="1000" y="172" width="262" height="10" fill="#173034"/>
    <text x="1012" y="174" fill="#9de5e8" font-size="11.5" font-weight="600">agent 提问 · 登录超时修复</text>
    <text class="ch" x="1012" y="204">backend</text>
    <text class="cb" x="1012" y="226">major or minor 版本？</text>
    <text class="cb" x="1012" y="280">回复本条消息，你的回答</text>
    <text class="cb" x="1012" y="294">会送回给该 agent。</text>
  </g>

  <!-- Resolved patch (current) -->
  <g>
    <rect class="card" x="714" y="318" width="262" height="92" rx="10"/>
    <rect x="714" y="318" width="262" height="26" rx="10" fill="#183024"/>
    <rect x="714" y="334" width="262" height="10" fill="#183024"/>
    <text x="726" y="336" fill="#73dca9" font-size="11.5" font-weight="600">已允许 ✓</text>
    <text class="cb" x="726" y="368" text-decoration="line-through">Run: npm test</text>
    <text class="cb" x="726" y="392">同步 patch 终态卡（双面同源）</text>
  </g>

  <g>
    <rect class="card" x="1000" y="318" width="262" height="92" rx="10"/>
    <text class="ch" x="1012" y="344" fill="#9de5e8">Issue 话题路由</text>
    <text class="cb" x="1012" y="368">在话题内 /bind &lt;issue-id&gt;</text>
    <text class="cb" x="1012" y="382">话题消息进 lead，lead 回复</text>
    <text class="cb" x="1012" y="396">也贴回这条话题</text>
  </g>

  <g>
    <rect class="card" x="714" y="426" width="548" height="78" rx="10"/>
    <text class="ch" x="726" y="452" fill="#9de5e8">自由对话 Concierge</text>
    <text class="cb" x="726" y="474">私聊通过 atlas_global MCP 核实工作区、Issue、待处理项；可代答 ask、</text>
    <text class="cb" x="726" y="490">给 lead 发消息或创建新 issue，不凭印象回答。</text>
  </g>

  <!-- Arrows: Atlas → bridge (outbound) -->
  <path class="gl" d="M306,188 H394" stroke="#49c0c9" marker-end="url(#im_aB)"/>
  <path class="gl" d="M306,272 H394" stroke="#49c0c9" marker-end="url(#im_aB)"/>
  <text class="lbl" x="316" y="180" fill="#78d6dc">事件</text>
  <text class="lbl" x="316" y="264" fill="#78d6dc">事件</text>

  <!-- Arrow: bridge → Feishu (send_card / patch_card) -->
  <path class="gl" d="M626,188 H714" stroke="#49c0c9" marker-end="url(#im_aB)"/>
  <path class="gl" d="M626,272 C654,272 690,250 714,228" stroke="#49c0c9" marker-end="url(#im_aB)"/>
  <text class="lbl" x="636" y="180" fill="#78d6dc">发卡</text>
  <text class="lbl" x="636" y="252" fill="#78d6dc">提问卡</text>
  <path class="gl" d="M626,352 C654,352 690,352 714,352" stroke="#49c0c9" marker-end="url(#im_aB)"/>
  <text class="lbl" x="636" y="344" fill="#78d6dc">patch 终态</text>

  <!-- Arrow: Feishu → bridge (inbound reply, ws) -->
  <path class="gl" d="M714,260 C690,295 654,295 626,260" stroke="#65d6a1" marker-end="url(#im_aB)" stroke-dasharray="0"/>
  <text class="lbl" x="640" y="296" fill="#65d6a1">回复 ws</text>

  <!-- Arrow: bridge → Atlas (registry.answer / bus.answer_ask) -->
  <path class="gl" d="M394,360 H306" stroke="#6b655c" marker-end="url(#im_a)"/>
  <text class="lbl" x="316" y="354">同函数应答</text>

  <!-- bottom legend -->
  <g transform="translate(40,548)">
    <rect width="14" height="6" rx="3" fill="#49c0c9"/>
    <text x="22" y="6" fill="#78d6dc" font-size="11">当前桥接</text>
    <text x="110" y="6" fill="#8e887f" font-size="11">Owner：首位私聊发送者 · 话题绑定：/bind &lt;issue-id&gt; · DB 错误 fail-closed</text>
  </g>
</svg>
